<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foundry | Loading</title>
  <!-- STYLING FIX: Restored the original, stable Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-dark: #050408;
    }

    body {
      margin: 0;
      background-color: var(--bg-dark);
      overflow: hidden;
    }

    #fluid-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      
      /* Start hidden to completely remove the initial random effect */
      opacity: 0;
      transition: opacity 0.5s ease-in;
      
      /* Natural bright fire grade with orange-red mids instead of blown-out white. */
      filter: sepia(100%) hue-rotate(-26deg) saturate(1150%) brightness(175%) contrast(118%);
      opacity: 1;
    }

    .ui-layer {
      position: relative;
      z-index: 10;
      pointer-events: none; 
    }

    #logo {
      /* SOLID LOGO - NO OPACITY */
      opacity: 1 !important;
      display: block;
      filter: drop-shadow(0 0 25px rgba(0, 0, 0, 0.9));
    }
  </style>
</head>
<body>

  <canvas id="fluid-canvas"></canvas>

  <main class="ui-layer w-screen h-screen flex items-center justify-center">
    <img id="logo" src="http://localhost:3000/foundry-logo.png" alt="Foundry Logo" class="w-auto h-32 md:h-44">
  </main>

  <script src="https://cdn.jsdelivr.net/npm/webgl-fluid@0.3.0"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canvas = document.getElementById('fluid-canvas');
      const logo = document.getElementById('logo');

      WebGLFluid(canvas, {
        TRIGGER: 'hover',
        IMMEDIATE: false,
        AUTO: false,
        SIM_RESOLUTION: 128,
        DYE_RESOLUTION: 1024,
        DENSITY_DISSIPATION: 0.92,
        VELOCITY_DISSIPATION: 0.96,
        PRESSURE: 0.8,
        CURL: 20,
        SPLAT_RADIUS: 0.075,
        SPLAT_FORCE: 4600,
        SHADING: true,
        COLORFUL: true,
        COLOR_UPDATE_SPEED: 4,
        TRANSPARENT: true,
        BLOOM: true,
        BLOOM_ITERATIONS: 8,
        BLOOM_RESOLUTION: 256,
        BLOOM_INTENSITY: 0.95,
        BLOOM_THRESHOLD: 0.46,
        SUNRAYS: false,
      });

      // Hide the initial random effect by fading in the canvas only after it's ready
      setTimeout(() => {
        canvas.style.opacity = '1';
      }, 100);

      let time = 0;

      function spawnFire() {
        if (!logo) return;
        const rect = logo.getBoundingClientRect();

        if (rect.width === 0) {
          return;
        }

        time += 0.14;

        const centerX = rect.left + rect.width / 2;
        const spread = rect.width * 0.24;
        const startX = centerX + Math.sin(time) * spread + Math.sin(time * 1.7) * (spread * 0.35);
        const startY = rect.bottom + 14;
        const endY = rect.bottom - 34;

        canvas.dispatchEvent(new MouseEvent('mousedown', {
          clientX: startX,
          clientY: startY,
          bubbles: true
        }));

        canvas.dispatchEvent(new MouseEvent('mousemove', {
          clientX: startX + (Math.random() - 0.5) * 3,
          clientY: endY,
          bubbles: true
        }));

        canvas.dispatchEvent(new MouseEvent('mouseup', {
          bubbles: true
        }));
      }

      setInterval(spawnFire, 48);
    });
  </script>
</body>
</html>```
